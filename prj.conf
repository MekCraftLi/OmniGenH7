CONFIG_LOG=y
CONFIG_SHELL=y
CONFIG_CPP=y

# DMA and UART async
CONFIG_DMA=y
CONFIG_UART_ASYNC_API=y

# Enable kernel features needed by async UART
CONFIG_TIMESLICING=y

# DAC and timer counter support for TIM6-triggered waveform output
CONFIG_DAC=y
CONFIG_COUNTER=y

# External OSPI NOR flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_JESD216_API=y
CONFIG_FLASH_STM32_OSPI=y

# Runtime resource statistics for shell diagnostics
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ALL=y
CONFIG_CPU_LOAD=y
CONFIG_CPU_LOAD_LOG_PERIODICALLY=0
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
